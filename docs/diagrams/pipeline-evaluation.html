<figcaption>
  <span class="label">Fig. 2.</span>
  Offline evaluation framework for benchmarking pyorica against multi-session EEG
  datasets. <b>(a)</b> Per-subject processing chain. Each session file is replayed
  chunk-by-chunk through the same stateful <code>EEGPipeline</code> used in live
  streaming (<i>simulated real-time</i>), accumulating four stage arrays (raw, IIR,
  ASR, ORICA) into a <code>RunResult</code>. A separate offline ICA decomposition
  (MNE extended Infomax, fitted on the full IIR stage array) then projects all three
  filtered stages through the same unmixing matrix to compute per-IC mean-square
  energy and percentage reduction relative to the IIR baseline. This measurement is
  independent of ORICA convergence state. <b>(b)</b> Cross-session aggregation.
  Per-subject CSVs are combined by taking the median IC source energy across
  components of the same ICLabel class within each subject, followed by cross-subject
  mean&thinsp;&plusmn;&thinsp;SD. Results are reported across all seven ICLabel classes
  regardless of class presence in individual subjects.
  <i>K</i> = number of independent components; <i>N</i> = total samples in session;
  SD = standard deviation across subjects.
</figcaption>

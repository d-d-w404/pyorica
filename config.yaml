# pyorica PipelineConfig
# Generated by PipelineConfig.to_yaml(). Edit values, then pass this
# file to run_all_subjects.py --config <this_file>.
#
# Defaults match the reference experiments (SN_Driveasrpy20_2min_70).

# ── IIR bandpass filter ──────────────────────────────────────────────
# Online Butterworth bandpass applied to every chunk before ASR.
iir_l_freq: 1.0            # lower cutoff (Hz)
iir_h_freq: 50.0           # upper cutoff (Hz)
iir_order: 4              # filter order (higher = sharper rolloff, more ringing)

# ── ASR (Artifact Subspace Reconstruction) ──────────────────────────
# "asrpy" matches the reference experiments and uses stateful chunk-by-
# chunk processing (R/Zi/cov). "meegkit" is available for comparison.
asr_backend: "asrpy"     # "asrpy" (default) or "meegkit"
asr_cutoff: 20.0          # SD multiplier; higher = less aggressive cleaning
asr_calibration_seconds: 120.0  # seconds of IIR-filtered data used to calibrate ASR

# ── ORICA (Online Recursive ICA) ────────────────────────────────────
# Forgetting factor profile: "cooling" (λ decreases over time),
# "constant", or "adaptive".
orica_ff_profile: "cooling"       # forgetting factor schedule
orica_block_size_white: 8       # samples per RLS whitening update
orica_block_size_ica: 8         # samples per ICA weight update
orica_lambda_0: 0.995       # initial forgetting factor λ₀ ∈ (0, 1)
orica_gamma: 0.6           # cooling decay rate (used when ff_profile=cooling)
orica_num_subgaussian: 0    # ICs assumed sub-Gaussian (0 = all super-Gaussian)
orica_tau_const: 3           # local stationarity window (samples); .inf = global

# ── ICLabel artifact classifier ─────────────────────────────────────
# ICs with artifact probability above this threshold are zeroed.
# Artifact classes: muscle, eye, heart, line noise, channel noise.
icalabel_threshold: 0.7      # probability threshold ∈ [0, 1]
